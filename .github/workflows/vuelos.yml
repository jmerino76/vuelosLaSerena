name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Permiso explícito para escribir en el repositorio

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Ejecutar script de Aviationstack
      env:
        AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
      run: python tu_script.py

    # Usamos una acción dedicada para hacer commit y push sin usar comandos nativos fallidos
    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC"
        file_pattern: 'vuelos_la_serena.json'
