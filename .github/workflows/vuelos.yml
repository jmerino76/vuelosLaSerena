name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual rápida

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Actualizar Marca de Tiempo del Panel
      run: |
        python -c "
        import json
        import os
        from datetime import datetime

        archivo = 'vuelos_la_serena.json'

        # Si el archivo real ya existe, solo actualizamos la hora de sincronización
        if os.path.exists(archivo):
            with open(archivo, 'r', encoding='utf-8') as f:
                data = json.load(f)
            
            data['ultima_actualizacion'] = datetime.now().strftime('%Y-%m-%d %H:%M:%S CLST')
            
            with open(archivo, 'w', encoding='utf-8') as f:
                json.dump(data, f, ensure_ascii=False, indent=4)
            print('Marca de tiempo actualizada con éxito sobre la grilla real.')
        else:
            print('Error: El archivo JSON base no existe.')
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🕒 Sincronización horaria del panel de vuelos"
        file_pattern: 'vuelos_la_serena.json'
