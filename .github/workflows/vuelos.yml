name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Script de Vuelos (OpenSky Contingencia)
      run: |
        python -c "
        import json
        import requests
        import time

        # Código ICAO del Aeropuerto La Florida de La Serena
        icao_airport = 'SCSE'
        
        # Consultamos vuelos de las últimas 24 horas (en formato Unix Timestamp)
        ahora = int(time.time())
        hace_24h = ahora - 86400

        # API Abierta de OpenSky Network (Salidas desde La Serena)
        url = f'https://opensky-network.org{icao_airport}&begin={hace_24h}&end={ahora}'

        try:
            print('Conectando con los servidores abiertos de OpenSky...')
            response = requests.get(url)
            print(f'Código de respuesta HTTP: {response.status_code}')
            
            if response.status_code == 200:
                vuelos = response.json()
                print(f'¡Éxito! Se encontraron {len(vuelos)} vuelos registrados.')
                
                # Guardamos los datos estructurados en tu JSON
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump({'proveedor': 'OpenSky Network', 'aeropuerto': 'La Serena (SCSE)', 'vuelos_24h': vuelos}, f, indent=4)
                print('Archivo vuelos_la_serena.json guardado correctamente.')
            else:
                print(f'El servidor público está saturado temporalmente (HTTP {response.status_code}).')
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump({'status': 'servidor_espera', 'mensaje': 'Reintentar más tarde'}, f, indent=4)
        except Exception as error:
            print(f'Error de conexión: {error}')
            exit(1)
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC (OpenSky)"
        file_pattern: 'vuelos_la_serena.json'
