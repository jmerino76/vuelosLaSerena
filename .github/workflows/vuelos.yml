name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Script de Vuelos (OpenSky Extendido)
      run: |
        python -c "
        import json
        import requests
        import time

        host_web = 'https://opensky-network.org'
        ruta_api = '/api/flights/departure'
        
        # Ampliamos el rango a 7 días atrás (604800 segundos) para capturar el último itinerario guardado
        ahora = int(time.time())
        hace_7dias = ahora - 604800

        url_limpia = f'{host_web}{ruta_api}?airport=SCSE&begin={hace_7dias}&end={ahora}'

        try:
            print('Iniciando conexion rango extendido hacia OpenSky Network...')
            response = requests.get(url_limpia)
            print(f'Codigo de respuesta HTTP: {response.status_code}')
            
            if response.status_code == 200:
                vuelos = response.json()
                print(f'Exito: Se procesaron {len(vuelos)} vuelos históricos.')
                
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump({'proveedor': 'OpenSky Network', 'aeropuerto': 'La Serena (SCSE)', 'rango': '7 dias', 'vuelos': vuelos}, f, indent=4)
                print('Archivo vuelos_la_serena.json modificado con exito.')
            else:
                print(f'El servidor respondio con codigo: {response.status_code}')
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump({'status': 'sin_datos_recientes', 'codigo': response.status_code, 'detalle': 'Intenta ampliando el rango o cambiando de API'}, f, indent=4)
        except Exception as error:
            print(f'Error critico de red: {error}')
            exit(1)
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC (Rango Extendido)"
        file_pattern: 'vuelos_la_serena.json'
