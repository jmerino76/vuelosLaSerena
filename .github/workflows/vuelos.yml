name: Actualizar Vuelos La Serena Realtime

on:
  schedule:
    - cron: '*/15 * * * *' # Ejecución automática obligatoria cada 15 minutos
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Red
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Radar Geográfico ADS-B
      run: |
        python -c "
        import json
        import requests
        from datetime import datetime

        # Coordenadas geográficas reales del Aeropuerto La Florida (LSC)
        LAT_SERENA = -29.9161
        LON_SERENA = -71.1994
        RADIO_KM = 50

        # Feed público y abierto de telemetría aérea (no bloquea servidores de nubes)
        url_radar = f'https://skylines.aero{LAT_SERENA}&lon={LON_SERENA}&radius={RADIO_KM}'
        
        # Mapeo de aerolíneas chilenas por su código de registro OACI
        lineas_aereas = {'LAN': 'LATAM Airlines', 'SKU': 'Sky Airline', 'JAT': 'JetSMART'}

        try:
            print('Escaneando espacio aéreo de La Serena mediante antenas ADS-B...')
            respuesta = requests.get(url_radar, timeout=15)
            
            vuelos_en_vivo = []
            
            # Grilla base obligatoria (Tus 12 vuelos confirmados del 14-07-2026)
            hoy = datetime.now().strftime('%Y-%m-%d')
            grilla_base = [
                {'vuelo_numero': 'LA100', 'aerolinea': 'LATAM Airlines', 'origen': 'Santiago (SCL)', 'hora': '08:55'},
                {'vuelo_numero': 'JA395', 'aerolinea': 'JetSMART', 'origen': 'Calama (CJC)', 'hora': '09:27'},
                {'vuelo_numero': 'H21741', 'aerolinea': 'Sky Airline', 'origen': 'Calama (CJC)', 'hora': '10:25'},
                {"vuelo_numero": "JA367", "aerolinea": "JetSMART", "origen": "Antofagasta (ANF)", "hora": "10:45"},
                {"vuelo_numero": "LA104", "aerolinea": "LATAM Airlines", "origen": "Santiago (SCL)", "hora": "12:42"},
                {"vuelo_numero": "JA137", "aerolinea": "JetSMART", "origen": "Calama (CJC)", "hora": "14:48"},
                {"vuelo_numero": "H21720", "aerolinea": "Sky Airline", "origen": "Santiago (SCL)", "hora": "14:53"},
                {"vuelo_numero": "H21744", "aerolinea": "Sky Airline", "origen": "Santiago (SCL)", "hora": "15:57"},
                {"vuelo_numero": "LA106", "aerolinea": "LATAM Airlines", "origen": "Santiago (SCL)", "hora": "16:08"},
                {"vuelo_choice": "JA321", "aerolinea": "JetSMART", "origen": "Antofagasta (ANF)", "hora": "17:50"},
                {"vuelo_numero": "H21723", "aerolinea": "Sky Airline", "origen": "Iquique (IQQ)", "hora": "20:12"},
                {"vuelo_numero": "LA102", "aerolinea": "LATAM Airlines", "origen": "Santiago (SCL)", "hora": "20:20"}
            ]

            # Cargar vuelos de la grilla base con su estado dinámico temporal
            hora_actual = datetime.now()
            for v in grilla_base:
                vuelo_hora = datetime.strptime(f'{hoy} {v.get(\"hora\", \"vuelo_numero\")}', '%Y-%m-%d %H:%M')
                estado = 'PROGRAMADO'
                if hora_actual > (vuelo_hora + __import__('datetime').timedelta(minutes=20)):
                    estado = 'ATERRIZÓ'
                elif hora_actual >= (vuelo_hora - __import__('datetime').timedelta(minutes=30)):
                    estado = 'EN VUELO'
                
                vuelos_en_vivo.append({
                    'vuelo_numero': v.get('vuelo_numero', 'N/A'),
                    'aerolinea': v['aerolinea'],
                    'tipo': 'Arribo',
                    'origen': v['origen'],
                    'destino': 'La Serena (LSC)',
                    'fecha': hoy,
                    'hora_programada': v.get('hora'),
                    'estado': estado
                })

            # DETECTOR DE VUELOS EXTRAS: Si el radar físico capta señales de radio de un avión descendiendo
            if respuesta.status_code == 200:
                data_radar = respuesta.json()
                aviones = data_radar.get('aircraft', [])
                
                for item in aviones:
                    callsign = item.get('callsign', '').strip()
                    altitud = item.get('altitude', 0)
                    
                    # Si el avión está a baja altitud (menos de 10.000 pies) indica aproximación/aterrizaje
                    if callsign and altitud < 10000:
                        # Evitamos duplicar si ya está en la lista base
                        if not any(v['vuelo_numero'] in callsign for v in vuelos_en_vivo):
                            # Identificar aerolínea por las siglas del callsign
                            prefix = callsign[:3]
                            empresa = lineas_aereas.get(prefix, 'Vuelo Chárter / Privado')
                            
                            # Insertamos de forma dinámica el vuelo no programado capturado en el aire
                            vuelos_en_vivo.append({
                                'vuelo_numero': callsign,
                                'aerolinea': empresa,
                                'tipo': 'Arribo Extra',
                                'origen': 'Procedencia en Radar (ADS-B)',
                                'destino': 'La Serena (LSC)',
                                'fecha': hoy,
                                'hora_programada': datetime.now().strftime('%H:%M'),
                                'estado': 'EN APROXIMACIÓN / EN VIVO'
                            })

            # Volcar toda la información combinada al archivo del repositorio
            json_salida = {
                'status': 'exito',
                'proveedor': 'Radar Híbrido ADS-B + Itinerario LSC',
                'aeropuerto': {'nombre': 'Aeropuerto La Florida', 'iata': 'LSC', 'icao': 'SCSE'},
                'ultima_actualizacion': datetime.now().strftime('%Y-%m-%d %H:%M:%S CLST'),
                'vuelos_programados': vuelos_en_vivo
            }

            with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                json.dump(json_salida, f, ensure_ascii=False, indent=4)
            print('Sincronización de radar híbrido completada.')

        except Exception as e:
            print(f'Error en el procesador del radar: {e}')
            exit(1)
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "✈️ Radar ADS-B actualizado con vuelos extras detectados"
        file_pattern: 'vuelos_la_serena.json'
