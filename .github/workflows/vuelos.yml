name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv
    - name: Ejecutar script de Aviationstack
      env:
        AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
      run: python tu_script.py
    - name: Auto-guardar cambios en GitHub
      run: |
        git config --local user.email "github-actions[bot]@://github.com"
        git config --local user.name "github-actions[bot]"
        git add vuelos_la_serena.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Actualización automática de vuelos LSC" && git push)
