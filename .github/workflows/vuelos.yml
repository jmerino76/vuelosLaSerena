name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Script de Vuelos
      env:
        AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
      run: |
        python -c "
        import os
        import json
        import requests

        key = os.environ.get('AVIATIONSTACK_KEY')
        iata = 'LSC'

        if not key:
            print('Error: La API Key no fue detectada.')
            exit(1)

        # Usamos la URL unificada directa que evita redirecciones a la Landing Page
        url = f'http://aviationstack.com{key}&dep_iata={iata}'

        try:
            print('Iniciando llamada directa a Aviationstack...')
            response = requests.get(url)
            print(f'Código de respuesta HTTP del servidor: {response.status_code}')
            
            try:
                data = response.json()
                print('¡Éxito! Estructura JSON válida recibida.')
                
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump(data, f, ensure_ascii=False, indent=4)
                print('Archivo vuelos_la_serena.json guardado correctamente.')
                
            except ValueError:
                print('⚠️ El servidor sigue respondiendo HTML. Guardando muestra del texto:')
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump({'status': 'error_redireccion', 'contenido': response.text[:300]}, f, indent=4)
                    
        except Exception as error:
            print(f'Falla crítica: {error}')
            exit(1)
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC"
        file_pattern: 'vuelos_la_serena.json'
