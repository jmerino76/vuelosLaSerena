name: Actualizar Vuelos La Serena Realtime

on:
  schedule:
    - cron: '*/15 * * * *' # El robot de GitHub correrá solo cada 15 minutos de forma perpetua
  workflow_dispatch: # Permite que lo pruebes manualmente cuando quieras

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Extracción
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Ejecutar Extractor Automatizado FlightAware
      run: python tu_script.py

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "✈️ Sincronización automática de retrasos desde FlightAware"
        file_pattern: 'vuelos_la_serena.json'
