            }

            with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                json.dump(datos_reales, f, ensure_ascii=False, indent=4)
            print('Mapeo de tráfico aéreo real completado con éxito.')

        except Exception as e:
            print(f'Error al hacer scraping: {e}')
            exit(1)
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "✈️ Tráfico Aéreo Real LSC actualizado"
        file_pattern: 'vuelos_la_serena.json'
