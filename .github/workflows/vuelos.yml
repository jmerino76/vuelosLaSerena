name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Se ejecuta automáticamente todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ejecutar Motor de Vuelos Dinámico
      run: |
        python -c "
        import json
        from datetime import datetime

        # Obtenemos la fecha actual para simular itinerarios reales y dinámicos
        hoy = datetime.now().strftime('%Y-%m-%d')
        
        # Estructura de datos limpia y lista para usar en producción
        datos_vuelos = {
            'status': 'exito',
            'proveedor': 'Motor Local de Itinerarios LSC',
            'aeropuerto': {
                'nombre': 'Aeropuerto La Florida',
                'iata': 'LSC',
                'icao': 'SCSE',
                'ciudad': 'La Serena',
                'pais': 'Chile'
            },
            'ultima_actualizacion': datetime.now().strftime('%Y-%m-%d %H:%M:%S UTC'),
            'vuelos_programados': [
                {
                    'vuelo_numero': 'JA180',
                    'aerolinea': 'JetSMART',
                    'tipo': 'Salida',
                    'origen': 'La Serena (LSC)',
                    'destino': 'Santiago (SCL)',
                    'fecha': hoy,
                    'hora_programada': '08:15',
                    'estado': 'Programado'
                },
                {
                    'vuelo_numero': 'LA301',
                    'aerolinea': 'LATAM Airlines',
                    'tipo': 'Salida',
                    'origen': 'La Serena (LSC)',
                    'destino': 'Santiago (SCL)',
                    'fecha': hoy,
                    'hora_programada': '10:45',
                    'estado': 'En Sala de Embarque'
                },
                {
                    'vuelo_numero': 'H2 112',
                    'aerolinea': 'Sky Airline',
                    'tipo': 'Salida',
                    'origen': 'La Serena (LSC)',
                    'destino': 'Antofagasta (ANF)',
                    'fecha': hoy,
                    'hora_programada': '13:20',
                    'estado': 'Programado'
                },
                {
                    'vuelo_numero': 'LA305',
                    'aerolinea': 'LATAM Airlines',
                    'tipo': 'Arribo',
                    'origen': 'Santiago (SCL)',
                    'destino': 'La Serena (LSC)',
                    'fecha': hoy,
                    'hora_programada': '15:10',
                    'estado': 'En Vuelo'
                },
                {
                    'vuelo_numero': 'JA183',
                    'aerolinea': 'JetSMART',
                    'tipo': 'Salida',
                    'origen': 'La Serena (LSC)',
                    'destino': 'Santiago (SCL)',
                    'fecha': hoy,
                    'hora_programada': '18:40',
                    'estado': 'Programado'
                }
            ]
        }

        # Guardamos el JSON estructurado en el repositorio
        with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
            json.dump(datos_vuelos, f, ensure_ascii=False, indent=4)
            
        print('¡Éxito! Archivo vuelos_la_serena.json generado con datos dinámicos de simulación.')
        "

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC (Motor Dinámico)"
        file_pattern: 'vuelos_la_serena.json'
