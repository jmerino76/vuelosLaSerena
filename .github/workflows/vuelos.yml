name: Actualizar Vuelos La Serena Realtime

on:
  schedule:
    - cron: '*/15 * * * *' # Ejecución automática cada 15 minutos
  workflow_dispatch: # Permite ejecución manual rápida

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Red
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Radar Geográfico ADS-B
      run: python tu_script.py

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "✈️ Radar ADS-B actualizado con vuelos extras detectados"
        file_pattern: 'vuelos_la_serena.json'
