name: Actualizar Vuelos La Serena

on:
  schedule:
    - cron: '0 8 * * *' # Todos los días a las 08:00 UTC
  workflow_dispatch: # Permite ejecución manual

jobs:
  run-script:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv

    - name: Crear y Ejecutar Script de Vuelos
      env:
        AVIATIONSTACK_KEY: ${{ secrets.AVIATIONSTACK_KEY }}
      run: |
        cat << 'EOF' > script_forzado.py
        import os
        import json
        import requests

        API_KEY = os.getenv('AVIATIONSTACK_KEY')
        AIRPORT_IATA = 'LSC'

        if not API_KEY:
            print("Error: No se encontró la API Key.")
            exit(1)

        # URL optimizada: Agregamos el límite estándar para que el servidor responda rápido
        url = f"http://aviationstack.com{API_KEY}&dep_iata={AIRPORT_IATA}&limit=10"

        try:
            print("Enviando petición a Aviationstack...")
            response = requests.get(url)
            print(f"Código de respuesta HTTP: {response.status_code}")
            
            if response.status_code == 200:
                data = response.json()
                
                # Rastreo: Verificar en la consola si la API trajo datos o vino vacía
                print(f"Respuesta cruda de la API: {data}")
                
                if "data" in data and len(data["data"]) == 0:
                    print("⚠️ Alerta: La API conectó bien pero el aeropuerto LSC no reporta vuelos en este instante.")
                
                with open('vuelos_la_serena.json', 'w', encoding='utf-8') as f:
                    json.dump(data, f, ensure_ascii=False, indent=4)
                print("Proceso de escritura completado en vuelos_la_serena.json.")
            else:
                print(f"Error en la API: {response.status_code} - {response.text}")
                exit(1) # Forzar caída para ver el error
        except Exception as e:
            print(f"Error crítico de ejecución: {e}")
            exit(1)
        EOF
        python script_forzado.py

    - name: Auto-guardar cambios en GitHub
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "🤖 Actualización automática de vuelos LSC"
        file_pattern: 'vuelos_la_serena.json'
