                    {'vuelo_numero': 'JA187', 'aerolinea': 'JetSMART', 'tipo': 'Salida', 'origen': 'La Serena (LSC)', 'destino': 'Santiago (SCL)', 'fecha': hoy, 'hora_programada': '18:30', 'estado': 'Programado'},
                    {'vuelo_numero': 'LA312', 'aerolinea': 'LATAM Airlines', 'tipo': 'Arribo', 'origen': 'Santiago (SCL)', 'destino': 'La Serena (LSC)', 'fecha': hoy, 'hora_programada': '20:15', 'estado': 'Programado'},
